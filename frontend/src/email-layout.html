<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:th-fragment="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title th:text="${emailTitle ?: 'DocSign'}">DocSign</title>
  <style>
    /* ── Reset ─────────────────────────────────────────────── */
    body, table, td, a { -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%; }
    table, td { mso-table-lspace:0pt; mso-table-rspace:0pt; }
    img { -ms-interpolation-mode:bicubic; border:0; outline:none; text-decoration:none; }
    body { margin:0 !important; padding:0 !important; background-color:#080B0F; }

    /* ── Typography ────────────────────────────────────────── */
    .email-body   { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .email-mono   { font-family: 'Courier New', Courier, monospace; }

    /* ── Dark shell ────────────────────────────────────────── */
    .shell        { background-color:#080B0F; padding:40px 20px; }
    .card         { background-color:#0D1117; border:1px solid #1E2A38;
                    border-radius:16px; max-width:560px; margin:0 auto;
                    overflow:hidden; }

    /* ── Header ────────────────────────────────────────────── */
    .card-header  { background-color:#111820; padding:28px 40px 24px;
                    border-bottom:1px solid #1E2A38; }
    .logo-text    { font-size:22px; font-weight:700; color:#EBF2F8;
                    text-decoration:none; letter-spacing:-0.5px; }
    .logo-accent  { color:#00D4AA; }

    /* ── Body ──────────────────────────────────────────────── */
    .card-body    { padding:36px 40px; }
    .headline     { font-size:22px; font-weight:600; color:#EBF2F8;
                    margin:0 0 8px; letter-spacing:-0.4px; line-height:1.25; }
    .subline      { font-size:14px; color:#7A94AD; margin:0 0 28px; line-height:1.5; }
    .body-text    { font-size:14px; color:#A8BDD0; line-height:1.7; margin:0 0 20px; }

    /* ── Primary CTA button ────────────────────────────────── */
    .btn-wrap     { text-align:center; margin:32px 0; }
    .btn-primary  { display:inline-block; padding:14px 32px;
                    background-color:#00D4AA; color:#080B0F !important;
                    font-size:15px; font-weight:700; border-radius:10px;
                    text-decoration:none; letter-spacing:0.2px; }

    /* ── Info box ──────────────────────────────────────────── */
    .info-box     { background-color:#111820; border:1px solid #1E2A38;
                    border-left:3px solid #00D4AA; border-radius:8px;
                    padding:16px 20px; margin:20px 0; }
    .info-row     { display:flex; margin-bottom:6px; font-size:13px; }
    .info-label   { color:#526880; width:120px; flex-shrink:0; }
    .info-value   { color:#D4E2EE; }

    /* ── Divider ────────────────────────────────────────────── */
    .divider      { border:none; border-top:1px solid #1E2A38; margin:24px 0; }

    /* ── Warning / success banners ─────────────────────────── */
    .banner-success { background:#002A22; border:1px solid #004A3A;
                      border-radius:8px; padding:14px 18px; margin:20px 0; }
    .banner-warn    { background:#2A1E00; border:1px solid #4A3600;
                      border-radius:8px; padding:14px 18px; margin:20px 0; }
    .banner-text    { font-size:13px; line-height:1.6; }

    /* ── Footer ─────────────────────────────────────────────── */
    .card-footer  { background-color:#080B0F; padding:24px 40px;
                    border-top:1px solid #1E2A38; }
    .footer-text  { font-size:11px; color:#3A4D62; text-align:center; line-height:1.6; }
    .footer-link  { color:#526880; text-decoration:underline; }

    /* ── Link fallback ──────────────────────────────────────── */
    .link-fallback { font-size:12px; color:#526880; word-break:break-all;
                     font-family:'Courier New', Courier, monospace; }
  </style>
</head>
<body class="email-body">
  <div class="shell">
    <table width="100%" cellpadding="0" cellspacing="0" border="0">
      <tr>
        <td align="center">
          <div class="card">

            <!-- Header -->
            <div class="card-header">
              <a href="#" class="logo-text">Doc<span class="logo-accent">Sign</span></a>
            </div>

            <!-- Body slot — overridden per template -->
            <div class="card-body" th:fragment="body">
              <th:block th:replace="${body}" />
            </div>

            <!-- Footer -->
            <div class="card-footer">
              <p class="footer-text">
                This email was sent by DocSign · <span class="email-mono">com.labmentix.docsign</span><br/>
                Electronic signatures secured with AES-256 encryption and SHA-256 document fingerprinting.<br/>
                <a class="footer-link" th:href="${appBaseUrl}">Visit DocSign</a> ·
                <span style="color:#263344;">© 2025 Labmentix</span>
              </p>
            </div>

          </div>
        </td>
      </tr>
    </table>
  </div>
</body>
</html>
