server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: docsign

  # ── PostgreSQL ──────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/DBdocsign
    username: postgres
    password: P@ssword
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  # ── JPA ─────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns schema; JPA only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  # ── Flyway ──────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # ── Redis ───────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # ── Mail ────────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ── Multipart uploads ───────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 52MB
      file-size-threshold: 2MB    # buffer to disk above this

  # ── Jackson ─────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

# ── App-specific config ────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:docsign-super-secret-key-minimum-32-characters-long}
    access-token-expiry-ms: 900000          # 15 minutes
    refresh-token-expiry-ms: 604800000      # 7 days

  signing:
    token-expiry-hours: 72                  # signing link validity
    base-url: ${APP_BASE_URL:http://localhost:5173}

  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-name: ${MINIO_BUCKET:docsign-documents}

  encryption:
    secret-key: ${AES_SECRET_KEY:dG9rZW5rZXlmb3Jkb2NzaWduMzJieXRlc2tleQ==}

  mail:
    from: ${MAIL_FROM:noreply@docsign.app}
    from-name: DocSign Platform

# ── Actuator ──────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── Logging ───────────────────────────────────────────────────
logging:
  level:
    com.labmentix.docsign: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"